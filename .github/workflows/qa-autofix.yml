name: QA Auto Fix

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number created by QA workflow"
        required: true
      base_branch:
        description: "Branch to target"
        required: false
        default: "main"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build verification (CI-safe, no Notion dependency)
        run: npm run stamp:build && npx vite build

      - name: Create autofix branch
        id: branch
        run: |
          BRANCH_NAME="autofix/qa-issue-${{ github.event.inputs.issue_number }}-${GITHUB_RUN_NUMBER}"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          git checkout -b "${BRANCH_NAME}"

      - name: Commit deterministic maintenance updates
        run: |
          npm run stamp:build
          if git diff --quiet; then
            echo "No deterministic changes detected."
            exit 0
          fi
          git add build/build_info.txt build/version.json RELEASE_NOTES.md
          git commit -m "chore: refresh build metadata for QA issue #${{ github.event.inputs.issue_number }}"
          git push --set-upstream origin "${{ steps.branch.outputs.branch_name }}"

      - name: Open pull request
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = Number('${{ github.event.inputs.issue_number }}');
            const branch = '${{ steps.branch.outputs.branch_name }}';
            const base = '${{ github.event.inputs.base_branch }}';
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: QA maintenance update for issue #${issue}`,
              head: branch,
              base,
              body: [
                `Automated follow-up for QA issue #${issue}.`,
                '',
                'This workflow currently performs safe deterministic updates only.',
                'For logic fixes, run the coding agent on the linked issue and push to this branch.'
              ].join('\n')
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue,
              body: `Opened follow-up PR: ${pr.html_url}`
            });
